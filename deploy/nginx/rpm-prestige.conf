# Nginx site for rpm-prestige-tools
#
# Replace YOUR_DOMAIN with your real domain (e.g. app.example.com). DNS must point to this VPS.
# HTTP (port 80) proxies to Docker containers that publish:
#   - Next.js on 127.0.0.1:3000
#   - API on 127.0.0.1:4000
#
# SSL: after DNS works, use Certbot (`certbot --nginx`) or install certs and uncomment the
# 443 server block at the bottom. Certbot usually edits this file for you.

# Named upstreams make it easy to change ports or add more app instances later.
upstream rpm_next {
    server 127.0.0.1:3000;
}

upstream rpm_api {
    server 127.0.0.1:4000;
}

# ----- HTTP: reverse proxy + ACME challenge folder for Let's Encrypt -----
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Webroot for http-01 challenges. Create with: sudo mkdir -p /var/www/certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Browser calls /api/...; Nginx strips the /api prefix when forwarding (trailing slash on proxy_pass).
    location /api/ {
        proxy_pass http://rpm_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://rpm_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

