# Runs PostgreSQL, the Node API, and the Next.js app as three containers on one Docker network.
# Nginx on the host (not in this file) listens on 80/443 and proxies to the published localhost ports.

services:
  db:
    # Official Postgres 16 image — data survives restarts in the named volume `pgdata`.
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file on the server}
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Only expose Postgres to localhost on the VPS (backend connects via Docker network `db:5432`).
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # `db` is the Docker service name — internal DNS resolves it inside the compose network.
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/app
      PORT: "4000"
      TEAM_NOTIFICATION_EMAILS: ${TEAM_NOTIFICATION_EMAILS:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      LEADSIMPLE_API_KEY: ${LEADSIMPLE_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env for team login}
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-http://docuseal:3000/api}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

  # Prestige Connect automation worker. Polls the `events` table and
  # executes user-defined automations. Talks to Postgres over the
  # compose network and to OpenPhone / Microsoft Graph / Anthropic
  # over the public internet.
  prestige-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/app
      OPENPHONE_API_KEY: ${OPENPHONE_API_KEY:-}
      OPENPHONE_FROM_NUMBER: ${OPENPHONE_FROM_NUMBER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  # Docuseal — self-hosted e-signature service. Browser hits sign.prestigedash.com,
  # which Nginx proxies to localhost:3001. Backend talks to it over the compose network at docuseal:3000.
  docuseal:
    image: docuseal/docuseal:latest
    container_name: rpm-docuseal
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - docuseal_data:/data
    environment:
      FORCE_SSL: "false"
      HOST: sign.prestigedash.com
      # Reuse the platform's existing SMTP creds so signing emails actually send.
      # Docuseal expects SMTP_ADDRESS / SMTP_USERNAME / SMTP_PASSWORD; we map our existing keys.
      SMTP_ADDRESS: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_AUTHENTICATION: ${DOCUSEAL_SMTP_AUTHENTICATION:-login}
      SMTP_DOMAIN: ${DOCUSEAL_SMTP_DOMAIN:-prestigedash.com}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  backend_uploads:
  docuseal_data:
